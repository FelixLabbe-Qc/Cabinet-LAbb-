<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cabinet L'Abbé - Réservation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap'); body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-[#f0f4f8]">
    <div id="app">
        <section id="agenda" class="py-24 px-6 bg-slate-900 text-white">
            <div class="max-w-5xl mx-auto text-center mb-12">
                <h2 class="text-4xl font-black uppercase italic tracking-tighter">Prendre Rendez-vous</h2>
                <p class="text-slate-400 mt-4">Sélectionnez une plage horaire entre 09:00 et 20:00</p>
            </div>

            <div class="max-w-5xl mx-auto bg-white/5 p-8 rounded-[3rem] border border-white/10">
                <div class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-3">
                    <button 
                        v-for="heure in heures" 
                        :key="heure.id"
                        @click="handleBooking(heure)"
                        :disabled="heure.prise"
                        :class="[
                            'py-5 rounded-2xl font-bold transition-all border relative',
                            heure.prise ? 'bg-white/5 border-transparent text-white/20' : 'bg-white/10 border-white/10 text-white hover:bg-blue-600'
                        ]"
                    >
                        <span v-if="heure.prise" class="text-[8px] absolute top-2 left-0 right-0 opacity-50 uppercase">Occupé</span>
                        {{ heure.temps }}
                    </button>
                </div>
            </div>
        </section>
    </div>

    <script>
        // --- CONFIGURATION FIREBASE ---
        // Remplace par tes clés Firebase ici :
        const firebaseConfig = {
            apiKey: "AIzaSyByM8N5_n72bDy_n1t2dq6m6_rT2u86NyM",
            authDomain: "cabinet-labbe-app.firebaseapp.com",
            projectId: "cabinet-labbe-app",
            storageBucket: "cabinet-labbe-app.firebasestorage.app",
            messagingSenderId: "44920288369",
            appId: "1:44920288369:web:1bd4fef9b66f3c5ed197d0"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const { createApp, ref, onMounted } = Vue;
        createApp({
            setup() {
                const heures = ref([]);
                
                const chargerAgenda = () => {
                    const tempHeures = [];
                    for (let h = 9; h <= 19; h++) {
                        const hh = h.toString().padStart(2, '0');
                        tempHeures.push({ id: hh+'00', temps: hh+':00', prise: false });
                        tempHeures.push({ id: hh+'30', temps: hh+':30', prise: false });
                    }
                    
                    // Écouter les rendez-vous en temps réel dans Firebase
                    db.collection("rendezvous").onSnapshot((snapshot) => {
                        const rdvPris = snapshot.docs.map(doc => doc.id);
                        heures.value = tempHeures.map(h => ({
                            ...h,
                            prise: rdvPris.includes(h.id)
                        }));
                    });
                };

                const handleBooking = async (heure) => {
                    const nom = prompt("Entrez votre nom pour confirmer à " + heure.temps);
                    if (nom) {
                        try {
                            await db.collection("rendezvous").doc(heure.id).set({
                                client: nom,
                                heure: heure.temps,
                                date: new Date().toLocaleDateString()
                            });
                            alert("Rendez-vous confirmé !");
                        } catch (e) {
                            alert("Erreur: Vérifiez si Firestore est en 'Mode Test'");
                        }
                    }
                };

                onMounted(chargerAgenda);
                return { heures, handleBooking };
            }
        }).mount('#app');
    </script>
</body>
</html>

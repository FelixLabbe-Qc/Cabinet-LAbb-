<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cabinet L'Abbé - Réservation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-[#f8fafc] text-slate-900">
    <div id="app">
        <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-600 p-2 rounded-xl"><i class="fas fa-balance-scale text-white"></i></div>
                    <h1 class="text-xl font-extrabold tracking-tighter uppercase">Cabinet L'Abbé</h1>
                </div>
                <div class="text-sm font-bold text-blue-600 bg-blue-50 px-4 py-2 rounded-full">
                    Ouvert jusqu'à 20:00
                </div>
            </div>
        </header>

        <section class="py-12 px-6 max-w-7xl mx-auto text-center">
            <h2 class="text-4xl md:text-5xl font-black mb-4">Réserver une consultation</h2>
            <p class="text-slate-500 font-medium">Sélectionnez une plage horaire ci-dessous pour votre rendez-vous à Otterburn Park.</p>
        </section>

        <main class="max-w-4xl mx-auto px-6 pb-20">
            <div class="bg-white rounded-[2.5rem] shadow-xl shadow-blue-100 border border-slate-100 overflow-hidden">
                <div class="bg-slate-50 p-6 border-b border-slate-100 flex justify-between items-center">
                    <h3 class="font-bold text-lg text-slate-700 uppercase tracking-wide">Agenda de la semaine</h3>
                    <span class="text-xs font-black text-slate-400">MARS 2026</span>
                </div>

                <div class="p-8">
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                        <button 
                            v-for="heure in heures" 
                            :key="heure.id"
                            @click="reserver(heure)"
                            :disabled="heure.prise"
                            :class="[
                                'py-4 rounded-2xl font-bold transition-all border-2 text-center relative overflow-hidden',
                                heure.prise 
                                    ? 'bg-slate-100 border-slate-200 text-slate-400 cursor-not-allowed' 
                                    : 'bg-white border-blue-100 text-blue-600 hover:border-blue-500 hover:bg-blue-50 active:scale-95'
                            ]"
                        >
                            <span v-if="heure.prise" class="text-[10px] uppercase absolute top-1 left-0 right-0">Indisponible</span>
                            <span :class="{'mt-2 inline-block': heure.prise}">{{ heure.temps }}</span>
                        </button>
                    </div>
                </div>

                <div class="bg-blue-600 p-8 text-white flex flex-col md:flex-row justify-between items-center gap-6">
                    <div>
                        <p class="font-black text-2xl">Besoin d'aide ?</p>
                        <p class="text-blue-100 font-medium italic">Contact direct pour Otterburn Park</p>
                    </div>
                    <a href="tel:5147586930" class="bg-white text-blue-600 px-8 py-4 rounded-2xl font-black text-xl shadow-lg shadow-blue-900/20">
                        514 758 6930
                    </a>
                </div>
            </div>
        </main>

        <footer class="py-10 text-center text-slate-400 text-xs font-bold uppercase tracking-widest">
            &copy; 2026 Cabinet L'Abbé - Droit & Équité
        </footer>
    </div>

    <script>
        const { createApp, ref } = Vue;

        createApp({
            setup() {
                // Génération des plages horaires de 09:00 à 20:00
                const heures = ref([]);
                for (let h = 9; h <= 19; h++) {
                    heures.value.push({
                        id: h,
                        temps: `${h.toString().padStart(2, '0')}:00`,
                        prise: false
                    });
                }

                // Fonction de réservation
                const reserver = (heure) => {
                    if (!heure.prise) {
                        if (confirm(`Voulez-vous réserver la plage de ${heure.temps} ?`)) {
                            heure.prise = true;
                            alert("Votre demande de rendez-vous a été envoyée au Cabinet L'Abbé.");
                        }
                    }
                };

                return { heures, reserver };
            }
        }).mount('#app');
    </script>
</body>
</html>

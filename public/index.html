<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cabinet L'Abbé - Réservation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        [v-cloak] { display: none; }
        .drawer-enter-active, .drawer-leave-active { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .drawer-enter-from, .drawer-leave-to { transform: translateX(100%); }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900">
    <div id="app" v-cloak>
        
        <nav class="fixed w-full z-50 bg-white/90 backdrop-blur-md border-b border-slate-200 h-20 flex items-center px-6">
            <div class="max-w-7xl mx-auto w-full flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="bg-emerald-800 p-2 rounded-xl shadow-lg"><i class="fas fa-balance-scale text-white"></i></div>
                    <span class="text-xl font-black tracking-tighter uppercase">Cabinet L'Abbé</span>
                </div>
                <div class="hidden md:flex gap-8 font-bold text-slate-500 text-sm">
                    <a href="#accueil" class="hover:text-emerald-800 transition">Accueil</a>
                    <a href="#services" class="hover:text-emerald-800 transition">Services</a>
                    <a href="#agenda" class="bg-emerald-800 text-white px-8 py-3 rounded-full hover:bg-emerald-900 shadow-xl">Rendez-vous</a>
                </div>
            </div>
        </nav>

        <div v-if="activeService" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm" @click="activeService = null">
            <div class="bg-white w-full max-w-xl rounded-[2.5rem] shadow-2xl overflow-hidden" @click.stop>
                <div class="bg-emerald-800 p-8 text-white">
                    <h3 class="text-3xl font-black uppercase tracking-tighter">{{ activeService.title }}</h3>
                </div>
                <div class="p-8">
                    <p class="text-slate-600 mb-6 font-medium">{{ activeService.longDesc }}</p>
                    <button @click="scrollToAgenda" class="w-full py-4 bg-emerald-800 text-white rounded-2xl font-bold">Réserver maintenant</button>
                </div>
            </div>
        </div>

        <div v-if="bookingSlot" class="fixed inset-0 z-[200] bg-slate-900/40 backdrop-blur-sm" @click="bookingSlot = null"></div>
        <transition name="drawer">
            <div v-if="bookingSlot" class="fixed top-0 right-0 bottom-0 w-full max-w-md bg-white z-[201] shadow-2xl p-8 overflow-y-auto">
                <button @click="bookingSlot = null" class="absolute top-6 right-6 text-slate-400 hover:text-red-500"><i class="fas fa-times text-2xl"></i></button>
                
                <h3 class="text-3xl font-black mb-2 uppercase tracking-tighter text-emerald-900 mt-8">Votre Réservation</h3>
                <p class="text-slate-500 font-bold mb-8">Le {{ formatDate(selectedDate) }} à {{ bookingSlot }}</p>

                <form @submit.prevent="saveBooking" class="space-y-6">
                    <div>
                        <label class="block text-xs font-black uppercase text-slate-400 mb-2">Nom Complet</label>
                        <input type="text" v-model="form.name" required class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-emerald-500 font-bold" placeholder="Félix L'Abbé">
                    </div>
                    <div>
                        <label class="block text-xs font-black uppercase text-slate-400 mb-2">Téléphone</label>
                        <input type="tel" v-model="form.phone" required class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-emerald-500 font-bold" placeholder="514 758 6930">
                    </div>
                    <div>
                        <label class="block text-xs font-black uppercase text-slate-400 mb-2">Raison du Rendez-vous</label>
                        <select v-model="form.reason" required class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-emerald-500 font-bold">
                            <option value="" disabled>Sélectionnez une raison...</option>
                            <option>Consultation Divorce / Séparation</option>
                            <option>Achat / Vente Immobilière</option>
                            <option>Litige Civil / Contrat</option>
                            <option>Droit des Affaires / Incorporation</option>
                            <option>Autre Urgence Juridique</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-black uppercase text-slate-400 mb-2">Message (Optionnel)</label>
                        <textarea v-model="form.notes" rows="3" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-emerald-500 font-bold" placeholder="Détails supplémentaires..."></textarea>
                    </div>
                    <button type="submit" class="w-full py-5 bg-emerald-800 text-white rounded-2xl font-black text-lg shadow-xl hover:bg-emerald-900 active:scale-95 transition-all">Confirmer mon rendez-vous</button>
                </form>
            </div>
        </transition>

        <header id="accueil" class="pt-48 pb-20 px-6 text-center">
            <h1 class="text-6xl md:text-8xl font-black text-slate-900 mb-8 tracking-tighter">Droit. <span class="text-emerald-800">Équité.</span></h1>
            <p class="text-xl text-slate-500 max-w-2xl mx-auto mb-12 font-medium leading-relaxed italic">Sélectionnez une heure pour réserver votre consultation juridique à Otterburn Park.</p>
        </header>

        <section id="services" class="py-12 px-6 max-w-7xl mx-auto grid md:grid-cols-2 lg:grid-cols-4 gap-8">
            <div v-for="s in services" :key="s.title" @click="activeService = s" class="bg-white p-10 rounded-[3rem] border border-slate-100 shadow-sm hover:shadow-2xl cursor-pointer group transition-all">
